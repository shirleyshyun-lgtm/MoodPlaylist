<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodPlaylist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <div class="logo-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <h1 class="title">MoodPlaylist</h1>
      <p class="subtitle">Tell me how you're feeling. I'll build you a playlist.</p>
    </header>

    <form id="moodForm" class="mood-form">
      <div class="input-group">
        <textarea id="moodInput" placeholder="e.g. I just got promoted and want to celebrate..." rows="3" maxlength="500"></textarea>
        <span class="char-count"><span id="charCount">0</span>/500</span>
      </div>
      <button type="submit" id="generateBtn">
        <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Generate Playlist
      </button>
    </form>

    <section id="playlist" class="playlist-card hidden" aria-live="polite">
      <div class="playlist-header">
        <div class="cover-art-visual">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="playlist-meta">
          <h2 id="playlistTitle"></h2>
          <p id="coverArt" class="cover-art-desc"></p>
        </div>
      </div>
      <ol id="trackList" class="track-list"></ol>
    </section>

    <div id="error" class="error-toast hidden" role="alert" aria-live="assertive"></div>
  </main>

  <footer class="footer">
    <p>Powered by AI &middot; Real songs, real vibes</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
